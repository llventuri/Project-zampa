{% extends "base.html" %}

{% block content %}

<h2>Registered Users</h2>

{% if users %}
    <ul>
        {% for user in users %}
            <li>
                <a href="{{ url_for('user_profile', user_id=user.id) }}">
                    {{ user.username }}
                </a>
                — {{ user.neighborhood }} — Dog: {{ user.dog_name }} ({{ user.dog_breed }})
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No users registered yet.</p>
{% endif %}

{% endblock %}
